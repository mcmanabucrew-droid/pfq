<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#60a5fa" stroke-width="8" opacity="0.4"/>
  
  <!-- Pixel Stars -->
  <rect x="80" y="80" width="16" height="16" fill="#ffffff" opacity="0.8"/>
  <rect x="400" y="120" width="20" height="20" fill="#fef08a" opacity="0.9"/>
  <rect x="120" y="380" width="16" height="16" fill="#ffffff" opacity="0.5"/>
  <rect x="420" y="340" width="16" height="16" fill="#ffffff" opacity="0.7"/>

  <!-- Pixel Obstacle Pillar Green/Red -->
  <rect x="340" y="280" width="110" height="232" fill="#7f1d1d"/>
  <rect x="320" y="280" width="150" height="40" fill="#dc2626"/>
  <rect x="350" y="340" width="80" height="20" fill="#991b1b"/>

  <!-- Pixel Hero Bird Character (Enlarged 8-bit style) -->
  <g transform="translate(110, 160)">
    <!-- Shadow/Cape -->
    <rect x="0" y="80" width="40" height="60" fill="#1e293b"/>
    <!-- Body -->
    <rect x="20" y="40" width="100" height="90" fill="#3b82f6"/>
    <!-- Face -->
    <rect x="60" y="20" width="80" height="80" fill="#fde047"/>
    <!-- Eye -->
    <rect x="100" y="40" width="20" height="20" fill="#000000"/>
    <!-- Headband / Hair -->
    <rect x="40" y="0" width="90" height="20" fill="#fbbf24"/>
    <rect x="20" y="20" width="40" height="20" fill="#fbbf24"/>
    <!-- Sword -->
    <rect x="140" y="50" width="80" height="16" fill="#f1f5f9"/>
    <rect x="220" y="40" width="20" height="36" fill="#f59e0b"/>
    <!-- Wing -->
    <rect x="0" y="40" width="50" height="30" fill="#ffffff"/>
  </g>

  <!-- Title Text Banner Accents -->
  <text x="256" y="460" font-family="monospace" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">QUEST</text>
</svg>
